[www]
; Set the user and group that the process will run as
user = www-data
group = www-data

; The critical change: Tell PHP to listen on port 9000 instead of a local Unix socket.
; This allows NGINX to send traffic over the Docker network.
listen = 9000

; Minimum required process management settings
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3