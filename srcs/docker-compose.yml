version: '3'
# ==========================================
# PERSISTENT VOLUMES (The exFAT Fix)
# ==========================================
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      # type: none and o: bind tell Docker to use a direct bind mount instead of managing the volume internally.
      type: none
      o: bind
      # device specifies the absolute path on the host system. 
      # Because this points to the native Linux filesystem (/home/), it bypasses your exFAT SSD's permission limitations.
      device: /home/malaamir/data/mariadb
      
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/malaamir/data/wordpress

services:
  # ==========================================
  # 1. DATABASE TIER
  # ==========================================
  mariadb:
    # container_name forces Docker to use this exact name instead of a random generated one.
    # This is required by the subject and allows other containers to ping it using the name 'mariadb'.
    container_name: mariadb
    build: 
      # context tells Docker where to look for the build files (Dockerfile, conf, tools).
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    # image tags the built container locally so you can easily identify it when running 'docker images'.
    image: mariadb:inception
    # restart: always guarantees the container reboots if the internal process crashes or the host restarts.
    restart: always
    # env_file injects the variables from your secure .env file into the container at runtime.
    env_file:
      - .env
    # networks attaches this container to the isolated 'inception_network' LAN.
    networks:
      - inception_network
    volumes:
      # This mounts the persistent 'mariadb_data' volume to the default MySQL storage path inside the container.
      - mariadb_data:/var/lib/mysql

  # ==========================================
  # 2. APPLICATION TIER
  # ==========================================
  wordpress:
    container_name: wordpress
    build: 
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:inception
    restart: always
    env_file:
      - .env
    networks:
      - inception_network
    volumes:
      # This mounts the persistent 'wordpress_data' volume to the standard web root inside the container.
      - wordpress_data:/var/www/html
    # depends_on delays the start of this container until 'mariadb' is up and running.
    # NOTE: This only checks if the container started, not if the database inside is fully ready.
    depends_on:
      - mariadb

  # ==========================================
  # 3. WEB SERVER TIER (The Entrypoint)
  # ==========================================
  nginx:
    container_name: nginx
    build: 
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:inception
    restart: always
    env_file:
      - .env
    networks:
      - inception_network
    # ports maps the host machine's physical port to the container's internal port (HOST:CONTAINER).
    # The subject mandates strictly exposing port 443. No other web ports can be listed here.
    ports:
      - "443:443"
    volumes:
      # NGINX must mount the exact same WordPress volume. It needs access to the static files (.css, .js)
      # to serve them directly, while passing PHP execution requests back to the WordPress container.
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress

  # ==========================================
  # 4. BONUS TIER (Placeholder Structure)
  # ==========================================
  # Uncomment and configure these as you build them.
  # WARNING: Do NOT add 'ports:' blocks to website, adminer, or redis. 
  # They must only be accessible through NGINX acting as a reverse proxy.
  
  # redis:
  #   container_name: redis
  #   build: ./requirements/bonus/redis
  #   image: redis:inception
  #   restart: always
  #   networks:
  #     - inception_network

  # ftp:
  #   container_name: ftp
  #   build: ./requirements/bonus/ftp
  #   image: ftp:inception
  #   restart: always
  #   env_file:
  #     - .env
  #   networks:
  #     - inception_network
  #   volumes:
  #     # FTP needs access to the WordPress files to upload data
  #     - wordpress_data:/var/www/html
  #   ports:
  #     # FTP requires port 21. Check subject rules on if this is the ONLY permitted extra port.
  #     - "21:21"
  # adminer:
  #   container_name: adminer
  #   build: ./requirements/bonus/adminer
  #   image: adminer:inception
  #   restart: always
  #   networks:
  #     - inception_network
  #   depends_on:
  #     - mariadb

  # glances: (The Extra Service)
  #   container_name: glances
  #   build: ./requirements/bonus/glances
  #   image: glances:inception
  #   restart: always
  #   networks:
  #     - inception_network

# ==========================================
# CUSTOM NETWORK
# ==========================================
networks:
  inception_network:
    # driver: bridge creates a private internal network. Containers on this network can communicate
    # with each other safely without exposing their traffic to the host machine.
    driver: bridge
